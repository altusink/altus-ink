# Railway Configuration
# https://docs.railway.app/reference/config-as-code

[build]
# Use Dockerfile for more reliable builds
builder = "dockerfile"

[deploy]
# TEMPORARILY DISABLED healthcheck to allow new deploy to activate
# healthcheckPath = "/health"
# healthcheckTimeout = 300

# Restart policy
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Number of replicas
numReplicas = 1
