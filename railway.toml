# Railway Configuration
# https://docs.railway.app/reference/config-as-code

[build]
# Use Dockerfile for more reliable builds
builder = "dockerfile"

[deploy]
# Health check config - increased timeout for DB migrations + seed
healthcheckPath = "/health"
healthcheckTimeout = 300
startCommand = "npx drizzle-kit push && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
