# Railway Configuration
# https://docs.railway.app/reference/config-as-code

[build]
# Use Dockerfile for more reliable builds
builder = "dockerfile"

[deploy]
# Health check - Railway has internal 2 min window, can't extend easily
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
# Don't override Dockerfile CMD - let it handle startup
